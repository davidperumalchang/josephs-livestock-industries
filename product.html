<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Josephs Livestock Industries - Browse our product catalog of livestock feed, pet food, farm supplies, and agricultural products.">
  <title>Our Products - Josephs Livestock Industries</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YT3N3Q79E0');
  </script>

</head>
<body>

  <!-- Header -->
  <nav class="navbar navbar-expand-lg fixed-top jli-navbar" id="header">
    <div class="container">
      <a class="navbar-brand jli-logo" href="index.html">Josephs Livestock Industries</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto me-3 gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html#about" data-i18n="nav.about">About Us</a></li>
          <li class="nav-item"><a class="nav-link active" href="product.html" data-i18n="nav.product">Our Products</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#contact" data-i18n="nav.contact">Contact</a></li>
        </ul>
        <div class="lang-switcher" id="langSwitcher">
          <button class="lang-btn active" data-lang="en">EN</button>
          <span class="lang-divider">|</span>
          <button class="lang-btn" data-lang="bm">BM</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Product Store Section -->
  <section class="jli-store" style="padding-top: 100px;">
    <div class="container">

      <!-- Search Bar -->
      <div class="row mb-4 align-items-center">
        <div class="col-md-6">
          <div class="jli-search-box">
            <svg class="jli-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="productSearch" class="form-control jli-search-input" data-i18n-placeholder="product.search" placeholder="Search products...">
          </div>
        </div>
        <div class="col-md-6 text-md-end mt-2 mt-md-0">
          <span class="text-muted" id="resultCount"></span>
        </div>
      </div>

      <div class="row g-4">

        <!-- Sidebar -->
        <div class="col-lg-3">
          <div class="jli-sidebar">
            <h5 class="jli-sidebar-title" data-i18n="product.categories">Categories</h5>
            <ul class="jli-category-list" id="categoryList">
              <!-- rendered by JS -->
            </ul>
          </div>
        </div>

        <!-- Product Grid -->
        <div class="col-lg-9">
          <div class="row g-4" id="productGrid">
            <!-- rendered by JS -->
          </div>
          <div class="text-center py-5 d-none" id="noResults">
            <p class="text-muted fs-5" data-i18n="product.noResults">No products found.</p>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Spacer before footer -->
  <div style="height: 80px;"></div>

  <!-- Footer -->
  <footer class="jli-footer text-center py-4">
    <div class="container">
      <div class="jli-footer-brand mb-2">
        <span class="jli-logo-icon">&#9670;</span>
        <span>Josephs Livestock Industries</span>
      </div>
      <p class="jli-footer-tagline mb-1" data-i18n="hero.tagline">Supporting Farmers. Feeding Livestock. Growing Agriculture.</p>
      <p class="jli-footer-copy mb-0">&copy; <span id="footerYear"></span> Josephs Livestock Industries. <span data-i18n="footer.rights">All rights reserved.</span></p>
      <p class="jli-footer-dev mt-2">Developed &amp; maintained by <a href="https://www.balanceandbyte.com/" target="_blank" rel="noopener noreferrer">Balance &amp; Byte</a></p>
    </div>
  </footer>

  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js?v=1.0.3"></script>
  <script src="js/product.js?v=1.0.3"></script>
